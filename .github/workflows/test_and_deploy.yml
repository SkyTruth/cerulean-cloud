name: Test and Deploy
on:
  push:
    branches: [main]
    tags:
      - "**"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  issues: write
  pull-requests: write

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: 3.11
          auto-update-conda: true

      - name: Build canonical test environment
        run: |
          REPO_ROOT="$GITHUB_WORKSPACE"
          CERU_CI="$REPO_ROOT/.conda/ceru-ci"

          conda create -y -p "$CERU_CI" python=3.11 pip
          conda install -y -p "$CERU_CI" postgresql postgis
          conda run -p "$CERU_CI" python -m pip install --upgrade pip setuptools wheel
          conda run -p "$CERU_CI" python -m pip install -r "$REPO_ROOT/requirements-test.txt"
          conda run -p "$CERU_CI" python -m pip install -r "$REPO_ROOT/requirements.txt"
          conda run -p "$CERU_CI" python -m pip install -r "$REPO_ROOT/cerulean_cloud/cloud_run_infer/requirements.txt"
          conda run -p "$CERU_CI" python -m pip install -r "$REPO_ROOT/cerulean_cloud/cloud_run_orchestrator/requirements.txt"
          conda run -p "$CERU_CI" python -m pip install -r "$REPO_ROOT/cerulean_cloud/cloud_run_tipg/requirements.txt"
          conda run -p "$CERU_CI" python -m pip install -r "$REPO_ROOT/cerulean_cloud/titiler_sentinel/requirements.txt"

      - name: Run pytest
        run: |
          REPO_ROOT="$GITHUB_WORKSPACE"
          CERU_CI="$REPO_ROOT/.conda/ceru-ci"
          RASTERIO_DIR="$(conda run -p "$CERU_CI" python -c 'from pathlib import Path; import rasterio; print(Path(rasterio.__file__).resolve().parent)')"

          PROJ_DATA="$RASTERIO_DIR/proj_data" \
          PROJ_LIB="$RASTERIO_DIR/proj_data" \
          GDAL_DATA="$RASTERIO_DIR/gdal_data" \
          conda run -p "$CERU_CI" python -m pytest --disable-pytest-warnings --deselect test/test_cerulean_cloud/test_database_client.py

      # Run pre-commit
      - name: run pre-commit
        run: |
          REPO_ROOT="$GITHUB_WORKSPACE"
          CERU_CI="$REPO_ROOT/.conda/ceru-ci"
          conda run -p "$CERU_CI" pre-commit run --all-files

  preview-test:
    name: Preview [TEST]
    needs: [tests]
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/main' && github.event_name != 'workflow_dispatch' && startsWith(github.event.ref, 'refs/tags') != true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Configure GCP Credentials
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/734798842681/locations/global/workloadIdentityPools/my-pool/providers/gh-provider"
          service_account: "git-cerulean-cloud@cerulean-338116.iam.gserviceaccount.com"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::162277344632:role/CeruleanCloudDeploy
          aws-region: eu-central-1

      - name: Configure docker for Artifact Registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev -q

      - run: pip install -r requirements.txt
      - uses: pulumi/actions@v5
        id: pulumi-images
        env:
          PULUMI_CONFIG_PASSPHRASE: "test"
        with:
          pulumi-version: '3.113.3'
          work-dir: images/
          command: preview
          stack-name: test
          comment-on-pr: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pulumi/actions@v5
        env:
          PULUMI_CONFIG_PASSPHRASE: "test"
          MODEL: ${{ steps.pulumi-images.outputs.model }}
        with:
          pulumi-version: '3.113.3'
          command: preview
          stack-name: test

          comment-on-pr: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

  deploy-test:
    name: Deploy [TEST]
    runs-on: ubuntu-latest
    environment: test
    concurrency: test
    needs: [tests]
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - id: configure-docker
        name: Configure Docker
        uses: ./.github/actions/configure-docker

      - id: deploy-infrastructure-test
        name: Deploy Infrastructure
        uses: ./.github/actions/deploy_infrastructure
        with:
          environment: test
          pulumi-version: 3.121.0
          pulumi-stack-passphrase: test

  deploy-staging:
    name: Deploy [STAGING]
    runs-on: ubuntu-latest
    environment: staging
    concurrency: staging
    needs: [tests]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - id: configure-docker
        name: Configure Docker
        uses: ./.github/actions/configure-docker

      - id: deploy-infrastructure-staging
        name: Deploy Infrastructure
        uses: ./.github/actions/deploy_infrastructure
        with:
          environment: staging
          pulumi-version: 3.121.0
          pulumi-stack-passphrase: staging

  deploy-production:
    name: Deploy [PRODUCTION]
    runs-on: ubuntu-latest
    environment: prod20240903
    concurrency: prod20240903
    needs: [tests]
    if: startsWith(github.event.ref, 'refs/tags')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - id: configure-docker
        name: Configure Docker
        uses: ./.github/actions/configure-docker

      - id: deploy-infrastructure-prod20240903
        name: Deploy Infrastructure
        uses: ./.github/actions/deploy_infrastructure
        with:
          environment: prod20240903
          pulumi-version: 3.121.0
          pulumi-stack-passphrase: prod20240903
